<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOLFLIX HOMEWORK | Brand New Day</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        blackBase: '#050505',
                        panel: '#111111',
                        netflixRed: '#E50914',
                        spideyBlue: '#0052FF'
                    },
                    fontFamily: {
                        cinematic: ['"Bebas Neue"', 'sans-serif'],
                        body: ['Inter', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace']
                    },
                    boxShadow: {
                        'red-glow': '0 0 30px rgba(229, 9, 20, 0.4)',
                        'blue-glow': '0 0 30px rgba(0, 82, 255, 0.4)',
                    }
                }
            }
        }
    </script>

    <style>
        body { 
            background-color: #000000; 
            color: #FFFFFF; 
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* Mobile App Container */
        #app-container {
            background-color: #050505;
            box-shadow: 0 0 50px rgba(0, 82, 255, 0.1);
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 82, 255, 0.15), transparent 60%);
        }

        /* Option Buttons */
        .option-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid #222;
            background-color: #111;
        }
        .option-btn:active { transform: scale(0.98); }
        .option-btn.selected-wrong {
            border-color: #E50914;
            background-color: rgba(229, 9, 20, 0.15);
            color: #ff6b6b;
            animation: shake 0.4s;
            box-shadow: inset 0 0 20px rgba(229, 9, 20, 0.2);
        }
        .option-btn.selected-correct {
            border-color: #0052FF;
            background-color: rgba(0, 82, 255, 0.15);
            color: #4da6ff;
            box-shadow: inset 0 0 20px rgba(0, 82, 255, 0.2);
        }
        .option-btn.disabled { opacity: 0.4; pointer-events: none; }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .slide-up-panel {
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1);
        }
        .slide-up-panel.show {
            transform: translateY(0);
        }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Hide scrollbar */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex justify-center min-h-screen bg-black">

    <!-- Mobile Constraint Container -->
    <div id="app-container" class="w-full max-w-md min-h-screen flex flex-col relative overflow-hidden">

        <!-- HEADER (Progress) -->
        <header class="w-full p-6 pt-8 pb-4 z-20 bg-blackBase/90 backdrop-blur-md hidden fixed top-0 border-b border-white/5" id="main-header">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-spider text-spideyBlue text-xl drop-shadow-blue-glow"></i>
                    <span class="font-cinematic tracking-widest text-lg uppercase text-white/90 mt-1">Wolflix Homework</span>
                </div>
                <div class="text-sm font-mono text-gray-500 font-bold">
                    <span id="current-step" class="text-white">1</span> / <span id="total-step">15</span>
                </div>
            </div>
            <!-- Progress Bar -->
            <div class="w-full h-1.5 bg-[#222] rounded-full overflow-hidden">
                <div id="progress-bar" class="h-full bg-spideyBlue transition-all duration-300 rounded-full shadow-[0_0_10px_#0052FF]" style="width: 0%;"></div>
            </div>
        </header>

        <!-- MAIN CONTENT (Questions & Slides) -->
        <main id="quiz-area" class="flex-grow flex flex-col justify-center p-6 pb-32 z-10 fade-in pt-24 relative">
            <!-- Rendered by JS -->
        </main>

        <!-- SUCCESS PANEL (Bottom Fixed for Quizzes) -->
        <div id="success-panel" class="fixed bottom-0 left-0 w-full max-w-md mx-auto bg-panel border-t border-spideyBlue/50 p-6 z-50 slide-up-panel shadow-[0_-10px_40px_rgba(0,82,255,0.2)]">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded border border-spideyBlue/50 bg-spideyBlue/10 flex items-center justify-center shadow-[0_0_15px_rgba(0,82,255,0.3)]">
                        <i class="fa-solid fa-check text-spideyBlue text-xl"></i>
                    </div>
                    <div>
                        <h3 class="font-cinematic tracking-widest text-spideyBlue text-2xl uppercase">SCENE CLEARED</h3>
                        <p class="text-[10px] font-mono text-gray-400 tracking-widest uppercase">Answer Accepted</p>
                    </div>
                </div>
            </div>
            <button onclick="nextStep()" class="w-full bg-spideyBlue text-white font-bold text-lg py-4 rounded transition-transform active:scale-95 shadow-[0_0_15px_rgba(0,82,255,0.4)] uppercase font-cinematic tracking-widest text-2xl">
                Next Scene
            </button>
        </div>

    </div>

    <!-- ENGINE LOGIC -->
    <script>
        // 1. HOMEWORK DATA (Cover + 15 Quizzes)
        const steps = [
            // Cover
            { type: "cover" },
            
            // Vocab Quizzes
            { type: "quiz", icon: "🎭", question: "I am sad, but I will _____ that I am happy.", options: ["forget", "pretend"], correct: 1 },
            { type: "quiz", icon: "🧠", question: "I don't remember his name. I always _____ it.", options: ["forget", "mutate"], correct: 0 },
            { type: "quiz", icon: "😭", question: "\"Quit your _____. Stop crying like that.\"", options: ["whimpering", "rebirth"], correct: 0 },
            { type: "quiz", icon: "🧬", question: "If the DNA is _____, it would be very dangerous.", options: ["pretending", "mutating"], correct: 1 },
            { type: "quiz", icon: "🎯", question: "When spiders lose their web, they are weak and _____.", options: ["vulnerable", "rebirth"], correct: 0 },
            { type: "quiz", icon: "🌅", question: "Surviving the danger amounts to a kind of _____.", options: ["rebirth", "whimpering"], correct: 0 },
            
            // Grammar Quizzes
            { type: "quiz", icon: "🕰️", question: "\"We _____ know each other, but now we don't speak.\"", options: ["use to", "used to"], correct: 1 },
            { type: "quiz", icon: "🚫", question: "\"I didn't _____ like pizza, but now I love it.\"", options: ["use to", "used to"], correct: 0 },
            { type: "quiz", icon: "❓", question: "\"Did you _____ wear glasses when you were a kid?\"", options: ["use to", "used to"], correct: 0 },
            { type: "quiz", icon: "🕹️", question: "My boss forces me to work. He _____ me work on Sundays.", options: ["makes", "lets"], correct: 0 },
            { type: "quiz", icon: "✅", question: "My mom allows me to play. She _____ me play video games.", options: ["makes", "lets"], correct: 1 },
            { type: "quiz", icon: "😢", question: "\"The sad movie made me _____.\"", options: ["cry", "to cry"], correct: 0 },
            { type: "quiz", icon: "🧠", question: "\"He _____ everyone forget about him.\"", options: ["made", "let"], correct: 0 },
            { type: "quiz", icon: "🗣️", question: "What does \"I used to play tennis\" mean?", options: ["I play tennis now.", "I don't play anymore."], correct: 1 },
            { type: "quiz", icon: "🕸️", question: "\"Something bad was _____ happen.\"", options: ["gonna", "going"], correct: 0 }
        ];

        // 2. STATE
        let state = {
            current: 0,
            score: 0, 
            firstTry: true,
            isLocked: false
        };

        const totalQuizzes = steps.filter(s => s.type === 'quiz').length;

        // 3. CORE FUNCTIONS
        function init() {
            renderStep();
        }

        function updateProgress() {
            const quizIndex = state.current; 
            const percent = (quizIndex / totalQuizzes) * 100;
            document.getElementById('progress-bar').style.width = `${percent}%`;
            document.getElementById('current-step').innerText = quizIndex || 1;
            document.getElementById('total-step').innerText = totalQuizzes;
        }

        function renderStep() {
            if (state.current >= steps.length) {
                renderEndScreen();
                return;
            }

            const step = steps[state.current];
            const area = document.getElementById('quiz-area');

            if (step.type === 'cover') {
                document.getElementById('main-header').classList.add('hidden');
                area.innerHTML = `
                    <div class="fade-in flex flex-col items-center justify-center h-full text-center mt-4">
                        <div class="w-full aspect-video rounded-xl overflow-hidden shadow-[0_0_40px_rgba(0,82,255,0.4)] mb-8 border-2 border-spideyBlue/50 relative group">
                            <img src="https://images.unsplash.com/photo-1635805737707-575885ab0820?auto=format&fit=crop&q=80&w=600" onerror="this.src='https://placehold.co/600x338/111/0052FF?text=Spider+Man'" alt="Spider-Man" class="absolute inset-0 w-full h-full object-cover opacity-60">
                            <div class="absolute inset-0 flex items-center justify-center">
                                <i class="fa-solid fa-play text-5xl text-spideyBlue drop-shadow-blue-glow"></i>
                            </div>
                        </div>
                        <h1 class="text-5xl font-cinematic text-white mb-2 tracking-widest leading-tight uppercase">Brand New Day</h1>
                        <p class="text-gray-400 font-mono tracking-widest text-xs mb-10 uppercase">Spider-Man • B1+ Intermediate</p>
                        
                        <div class="bg-panel border border-white/10 px-6 py-5 rounded-lg flex flex-col gap-3 mb-10 w-full text-left shadow-lg">
                            <p class="font-mono text-[10px] text-spideyBlue tracking-widest uppercase border-b border-white/10 pb-2"><i class="fa-solid fa-list-check mr-2"></i>Episode Objectives</p>
                            <p class="text-sm text-gray-300 font-body mt-2">Complete <strong class="text-white font-bold">15 exercises</strong> focusing on the structure of "Used To", Causative Verbs (Make vs Let), and key vocabulary.</p>
                        </div>

                        <button onclick="nextStep()" class="w-full bg-netflixRed text-white font-cinematic text-2xl tracking-widest py-4 rounded transition-transform active:scale-95 shadow-[0_0_20px_rgba(229,9,20,0.5)] uppercase">
                            Start Episode
                        </button>
                    </div>
                `;
            } else if (step.type === 'quiz') {
                document.getElementById('main-header').classList.remove('hidden');
                state.firstTry = true;
                state.isLocked = false;
                document.getElementById('success-panel').classList.remove('show');
                updateProgress();

                let optionsHtml = '';
                step.options.forEach((opt, index) => {
                    optionsHtml += `
                        <button onclick="checkAnswer(${index}, this)" class="option-btn w-full p-5 rounded-xl font-body font-medium text-lg flex justify-between items-center mb-4">
                            <span class="text-left">${opt}</span>
                            <i class="fa-solid fa-circle text-gray-700 text-sm indicator-icon"></i>
                        </button>
                    `;
                });

                area.innerHTML = `
                    <div class="fade-in flex flex-col h-full justify-center mt-4">
                        <div class="w-20 h-20 bg-panel border border-white/10 rounded-2xl flex items-center justify-center text-4xl mb-8 shadow-lg">
                            ${step.icon}
                        </div>
                        <h2 class="font-body text-2xl text-white mb-10 leading-relaxed font-medium">"${step.question}"</h2>
                        <div id="options-container">
                            ${optionsHtml}
                        </div>
                    </div>
                `;
            }
        }

        function checkAnswer(index, btnEl) {
            if (state.isLocked) return;

            const q = steps[state.current];
            const isCorrect = (index === q.correct);
            const indicator = btnEl.querySelector('.indicator-icon');

            if (isCorrect) {
                state.isLocked = true;
                btnEl.classList.add('selected-correct');
                indicator.classList.remove('fa-circle', 'text-gray-700');
                indicator.classList.add('fa-check-circle', 'text-spideyBlue');
                
                if (state.firstTry) state.score++;

                const allBtns = document.querySelectorAll('.option-btn');
                allBtns.forEach(b => { if (b !== btnEl) b.classList.add('disabled'); });

                document.getElementById('success-panel').classList.add('show');
                if (navigator.vibrate) navigator.vibrate(50);

            } else {
                state.firstTry = false;
                btnEl.classList.add('selected-wrong');
                indicator.classList.remove('fa-circle', 'text-gray-700');
                indicator.classList.add('fa-xmark', 'text-netflixRed');
                
                if (navigator.vibrate) navigator.vibrate([50, 50, 50]);

                setTimeout(() => {
                    btnEl.classList.remove('selected-wrong');
                    indicator.classList.remove('fa-xmark', 'text-netflixRed');
                    indicator.classList.add('fa-circle', 'text-gray-700');
                }, 800);
            }
        }

        function nextStep() {
            state.current++;
            renderStep();
        }

        function renderEndScreen() {
            const area = document.getElementById('quiz-area');
            const percent = Math.round((state.score / totalQuizzes) * 100);
            
            document.getElementById('main-header').classList.add('hidden');
            document.getElementById('success-panel').classList.remove('show');

            let message = "EPISODE CLEARED";
            let colorClass = "text-white";
            let shadowClass = "drop-shadow-[0_0_15px_rgba(255,255,255,0.5)]";
            
            if (percent === 100) {
                message = "FLAWLESS EPISODE";
                colorClass = "text-spideyBlue";
                shadowClass = "drop-shadow-[0_0_15px_rgba(0,82,255,0.6)]";
            } else if (percent < 70) {
                message = "NEEDS REVISION";
                colorClass = "text-gray-400";
                shadowClass = "";
            }

            area.innerHTML = `
                <div class="fade-in flex flex-col items-center text-center justify-center h-full pt-10">
                    
                    <i class="fa-solid fa-spider text-7xl mb-6 text-spideyBlue drop-shadow-blue-glow"></i>
                    
                    <h1 class="font-cinematic text-5xl mb-2 ${colorClass} ${shadowClass} tracking-widest">${message}</h1>
                    <p class="font-mono text-gray-500 text-xs tracking-widest mb-10 uppercase">Memory synchronization complete.</p>
                    
                    <div class="bg-panel border border-white/10 p-8 rounded-xl w-full max-w-sm shadow-2xl relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-1 bg-spideyBlue opacity-70"></div>
                        <p class="font-mono text-[10px] uppercase tracking-widest text-gray-400 mb-4">First Try Accuracy</p>
                        <div class="font-cinematic text-7xl text-white mb-2 tracking-widest drop-shadow-[0_0_10px_rgba(255,255,255,0.3)]">${percent}%</div>
                        <p class="font-body text-sm text-gray-400">${state.score} of ${totalQuizzes} questions correct.</p>
                    </div>

                    <div class="mt-8 bg-void border border-white/5 p-4 rounded-lg flex items-start gap-4 w-full">
                        <i class="fa-solid fa-camera text-gray-500 mt-1"></i>
                        <p class="text-xs text-left text-gray-400 font-mono leading-relaxed">Capture this interface and transmit the screenshot to your Teacher.</p>
                    </div>
                    
                    <a href="https://www.youtube.com/watch?v=8TZMtslA3UY" target="_blank" class="mt-8 w-full bg-netflixRed hover:bg-red-800 text-white font-cinematic text-2xl tracking-widest py-4 rounded transition-all flex items-center justify-center gap-3 uppercase shadow-[0_0_15px_rgba(229,9,20,0.5)]">
                        <i class="fa-brands fa-youtube text-xl mb-1"></i> Re-watch Trailer
                    </a>

                    <button onclick="location.reload()" class="mt-8 mb-10 text-gray-500 hover:text-white font-mono text-[10px] uppercase tracking-widest transition-colors">
                        [ Restart Episode ]
                    </button>
                </div>
            `;
        }

        // Start
        window.onload = init;
    </script>
</body>
</html>
